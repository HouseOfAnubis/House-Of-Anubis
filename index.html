<!DOCTYPE html>
<html>
<head>
<title>My Video Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#111;
padding:20px;
font-size:26px;
text-align:center;
}

.container{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:25px;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
}

.title{
padding:12px;
font-size:15px;
}

.player{
margin-top:50px;
display:flex;
justify-content:center;
}

iframe{
width:900px;
height:500px;
border-radius:10px;
border:none;
}

</style>
</head>

<body>

<header>
My Video Website
</header>

<div class="container">

<div class="grid">

<div class="card" onclick="playVideo('https://short.icu/wQnWrqCW4')">
<img src="https://picsum.photos/500/300">
<div class="title">Episode 1</div>
</div>

</div>

<div class="player">
<iframe id="player"></iframe>
</div>

</div>

<script>

function playVideo(url){
document.getElementById("player").src = url
}

</script>

</body>
</html>
